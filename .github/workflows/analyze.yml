name: Flutter Code Analysis

on:
  push:
    branches:
      - develop  
      - main    
  pull_request:
    branches:
      - develop  
      - main    

jobs:
  analysis:
    name: Analyse statique du code
    runs-on: ubuntu-latest

    steps:
      # Récupère le code source du repo sur la machine virtuelle
      - name: Checkout du code
        uses: actions/checkout@v4

      # Installe Flutter sur la machine virtuelle
      - name: Installation de Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'

      # Télécharge toutes les dépendances nécessaires
      - name: Installation des dépendances
        run: flutter pub get

      # Analyse le code à la recherche d'erreurs, warnings et problèmes de style
      - name: Analyse statique du code
        run: flutter analyze
