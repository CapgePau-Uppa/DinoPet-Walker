<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Redirection DinoPet Walker...</title>
  <script>
    window.onload = function() {
      // Récuperation des paramètres de l'URL envoyés par Firebase
      const queryString = window.location.search;

      // Redirection vers l'application
      window.location.href = "dinopetwalker://" + queryString;
    };
  </script>
</head>
<body style="text-align: center; font-family: sans-serif; padding-top: 50px;">
<h2>Ouverture de DinoPet Walker...</h2>
<p>Si l'application ne s'ouvre pas, <a id="app-link" href="#">cliquez ici</a>.</p>

<script>
  document.getElementById("app-link").href = "dinopetwalker://" + window.location.search;
</script>
</body>
</html>
